<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keymote Controller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/styles.css">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    
    <!-- iOS Safari PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Keymote">
    <meta name="theme-color" content="#FFD700">
    <meta name="msapplication-TileColor" content="#1a1a1a">
    
    <!-- iOS Safari PWA Icons -->
    <link rel="apple-touch-icon" sizes="152x152" href="static/images/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="static/images/icon-180x180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="static/images/icon-167x167.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="static/images/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="static/images/icon-16x16.png">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="hamburger" id="hamburger-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="logo">
                <img src="static/images/keymotelogo.png" alt="Keymote" />
            </div>
        </header>
        <!-- Slide X of Y display -->
        <div class="slide-of-total" style="text-align:center; font-size: 32px; font-weight: 500; color: #ffd60a; margin-top: 0px; margin-bottom: -8px;">
            Slide <span id="current-slide-number">--</span> of <span id="total-slide-number">--</span>
        </div>

        <!-- Dropdown Menu -->
        <div class="dropdown-menu" id="dropdown-menu">
            <div class="menu-item" onclick="openPresentation()">
                <span class="menu-icon">📁</span>
                <span class="menu-text">Open Presentation</span>
            </div>
            <div class="menu-item" id="stop-presentation-menu" onclick="stopPresentationFromMenu()" style="display: none;">
                <span class="menu-icon">🛑</span>
                <span class="menu-text">Stop Presentation</span>
            </div>
            <div class="menu-item" id="close-presentation-menu" onclick="closePresentationFromMenu()" style="display: none;">
                <span class="menu-icon">❌</span>
                <span class="menu-text">Close Presentation</span>
            </div>
        </div>

        <!-- Main Time Display -->
        <div class="time-display" style="display: block; margin-bottom: 60px; height: auto;">
            <div class="main-time-numbers">
                <span id="main-time-hours" class="main-time-hours">00</span>
                <span class="main-time-colon">:</span>
                <span id="main-time-minutes" class="main-time-minutes">00</span>
                <span class="main-time-colon">:</span>
                <span id="main-time-seconds" class="main-time-seconds">00</span>
            </div>
            <div class="timer-below-info" style="display: flex; justify-content: center; gap: 40px; margin-top: -10px;">
                <div class="time-info">
                    <span class="label yellow">Total Time</span>
                    <span class="value white" id="total-time-display">0:00:00</span>
                </div>
                <div class="time-info">
                    <span class="label yellow">Tracking</span>
                    <span class="value white" id="tracking-display">0:00</span>
                </div>
                <div class="time-info">
                    <span class="label yellow">Target Time</span>
                    <span class="value white" id="target-time-display">3:00:00</span>
                </div>
            </div>
        </div>

        <!-- Control Buttons -->
        <div class="controls">
            <!--<button class="control-btn" id="start-btn" onclick="goToFirstSlide()">
                <img src="static/images/start.svg" alt="First Slide" />
            </button>-->
            <button class="control-btn" id="previous-btn" onclick="previousSlide()">
                <img src="static/images/previous.svg" alt="Previous" />
            </button>
            <button class="control-btn" id="play-pause-btn">
                <img src="static/images/play.svg" alt="Play" id="play-pause-icon" />
            </button>
            <button class="control-btn" id="next-btn" onclick="nextSlide()">
                <img src="static/images/next.svg" alt="Next" />
            </button>
            <!--<button class="control-btn" id="end-btn" onclick="goToLastSlide()">
                <img src="static/images/end.svg" alt="Last Slide" />
            </button>-->
        </div>

        <!-- Slide Progress Container -->
        <div class="slides-container" id="slides-container">
            <!-- Slides will be dynamically generated here -->
            <div class="no-presentation-message" id="no-presentation-message" style="text-align: center; padding: 40px; color: #888; font-style: italic;">
                No presentation loaded. Use the menu to open a presentation.
            </div>
        </div>
    </div>

    <!-- Socket.IO for real-time updates -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.0/socket.io.js"></script>
    
    <script>
        // Global variables
        let currentSlideIndex = 1;
        let totalSlides = 0;
        let timingData = {};
        let socket = null;

        // Wake Lock API variable (for non-iOS only)
        let wakeLock = null;

        // Timer variables
        let timerInterval = null;
        let presentationStartTime = null;
        let totalElapsedSeconds = 0;
        let isPaused = false;
        let pauseStartTime = null;
        let totalPausedTime = 0;

        // Track current slide elapsed time and last update timestamp
        window.currentSlideElapsed = 0;
        window.currentSlideElapsedBase = 0;
        window.currentSlideElapsedTimestamp = null;
        window.currentSlideElapsedInterval = null;

        // [REFAC] Timer Overhaul: All time tracking is now client-side. Timer state is updated and sent to the server on every change.

        // --- Timer State ---
        let presentationTimer = {
            isRunning: false,
            startTimestamp: null, // Date.now() when started
            elapsed: 0,           // seconds
            pausedAt: null,       // Date.now() when paused
            totalPaused: 0        // ms
        };
        let slideTimers = {}; // { [slideIndex]: { elapsed: seconds, startTimestamp: null, isRunning: false, pausedAt: null, totalPaused: 0 } }

        // --- Timer Logic ---
        function startPresentationTimer() {
            if (!presentationTimer.isRunning) {
                presentationTimer.isRunning = true;
                presentationTimer.startTimestamp = Date.now();
                if (presentationTimer.pausedAt) {
                    presentationTimer.totalPaused += Date.now() - presentationTimer.pausedAt;
                    presentationTimer.pausedAt = null;
                }
                updatePresentationTimerUI();
                requestAnimationFrame(updatePresentationTimerLoop);
                syncTimerStateToServer();
            }
        }
        function pausePresentationTimer() {
            if (presentationTimer.isRunning) {
                presentationTimer.isRunning = false;
                presentationTimer.pausedAt = Date.now();
                updatePresentationTimerUI();
                syncTimerStateToServer();
            }
        }
        function resetPresentationTimer() {
            presentationTimer = {
                isRunning: false,
                startTimestamp: null,
                elapsed: 0,
                pausedAt: null,
                totalPaused: 0
            };
            updatePresentationTimerUI();
            syncTimerStateToServer();
        }
        function updatePresentationTimerLoop() {
            if (presentationTimer.isRunning) {
                updatePresentationTimerUI();
                requestAnimationFrame(updatePresentationTimerLoop);
            }
        }
        function updatePresentationTimerUI() {
            let elapsed = presentationTimer.elapsed;
            if (presentationTimer.isRunning && presentationTimer.startTimestamp) {
                elapsed += Math.floor((Date.now() - presentationTimer.startTimestamp - presentationTimer.totalPaused) / 1000);
            }
            // Update UI (reuse existing updateDigitDisplay, etc.)
            // ...
        }

        // --- Per-Slide Timer Logic ---
        function startSlideTimer(slideIndex) {
            if (!slideTimers[slideIndex]) {
                slideTimers[slideIndex] = { elapsed: 0, startTimestamp: null, isRunning: false, pausedAt: null, totalPaused: 0 };
            }
            let timer = slideTimers[slideIndex];
            if (!timer.isRunning) {
                timer.isRunning = true;
                timer.startTimestamp = Date.now();
                if (timer.pausedAt) {
                    timer.totalPaused += Date.now() - timer.pausedAt;
                    timer.pausedAt = null;
                }
                updateSlideTimerUI(slideIndex);
                requestAnimationFrame(() => updateSlideTimerLoop(slideIndex));
                syncTimerStateToServer();
            }
        }
        function pauseSlideTimer(slideIndex) {
            let timer = slideTimers[slideIndex];
            if (timer && timer.isRunning) {
                timer.isRunning = false;
                timer.pausedAt = Date.now();
                updateSlideTimerUI(slideIndex);
                syncTimerStateToServer();
            }
        }
        function resetSlideTimer(slideIndex) {
            slideTimers[slideIndex] = { elapsed: 0, startTimestamp: null, isRunning: false, pausedAt: null, totalPaused: 0 };
            updateSlideTimerUI(slideIndex);
            syncTimerStateToServer();
        }
        function updateSlideTimerLoop(slideIndex) {
            let timer = slideTimers[slideIndex];
            if (timer && timer.isRunning) {
                updateSlideTimerUI(slideIndex);
                requestAnimationFrame(() => updateSlideTimerLoop(slideIndex));
            }
        }
        function updateSlideTimerUI(slideIndex) {
            let timer = slideTimers[slideIndex];
            let elapsed = timer ? timer.elapsed : 0;
            if (timer && timer.isRunning && timer.startTimestamp) {
                elapsed += Math.floor((Date.now() - timer.startTimestamp - timer.totalPaused) / 1000);
            }
            // Update UI for this slide (reuse updateCurrentSlideElapsedLabel, etc.)
            // ...
        }

        // --- Slide Change Handler ---
        function onSlideChange(newSlideIndex) {
            // Pause previous slide timer
            if (slideTimers[currentSlideIndex]) {
                pauseSlideTimer(currentSlideIndex);
            }
            // Start new slide timer
            startSlideTimer(newSlideIndex);
            // Update current slide index
            currentSlideIndex = newSlideIndex;
            // Sync all timer state
            syncTimerStateToServer();
        }

        // --- Timer Sync to Server ---
        function syncTimerStateToServer() {
            // Prepare timer state payload
            const payload = {
                presentationTimer: {
                    elapsed: getPresentationElapsed(),
                    isRunning: presentationTimer.isRunning
                },
                slideTimers: Object.fromEntries(Object.entries(slideTimers).map(([idx, t]) => [idx, { elapsed: getSlideElapsed(idx), isRunning: t.isRunning }]))
            };
            // Send to server (POST/PUT to /timer_state or similar endpoint)
            fetch('/timer_state', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
        function getPresentationElapsed() {
            let elapsed = presentationTimer.elapsed;
            if (presentationTimer.isRunning && presentationTimer.startTimestamp) {
                elapsed += Math.floor((Date.now() - presentationTimer.startTimestamp - presentationTimer.totalPaused) / 1000);
            }
            return elapsed;
        }
        function getSlideElapsed(slideIndex) {
            let timer = slideTimers[slideIndex];
            let elapsed = timer ? timer.elapsed : 0;
            if (timer && timer.isRunning && timer.startTimestamp) {
                elapsed += Math.floor((Date.now() - timer.startTimestamp - timer.totalPaused) / 1000);
            }
            return elapsed;
        }

        // Utility to format seconds as M:SS
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // Fetch and display current slide number
        async function fetchCurrentSlide() {
            try {
                const response = await fetch('/current_slide_number');
                const data = await response.json();
                if (data.status === "success" && data.slideNumber !== null && data.slideNumber !== undefined) {
                    const oldSlideIndex = currentSlideIndex;
                    currentSlideIndex = parseInt(data.slideNumber);
                    document.getElementById('current-slide-number').textContent = data.slideNumber;
                    
                    updateCurrentSlideHighlight();
                    
                    // Trigger scroll if slide actually changed
                    if (oldSlideIndex !== currentSlideIndex) {
                        scrollToCurrentSlideDebounced();
                    }
                } else {
                    currentSlideIndex = 0;
                    document.getElementById('current-slide-number').textContent = '--';
                }
            } catch (error) {
                currentSlideIndex = 0;
                document.getElementById('current-slide-number').textContent = '--';
            }
        }

        // Fetch and display total slides
        async function fetchTotalSlides() {
            try {
                const response = await fetch('/total_slides');
                const data = await response.json();
                if (data.status === "success" && data.totalSlides !== null && data.totalSlides !== undefined) {
                    totalSlides = parseInt(data.totalSlides);
                    document.getElementById('total-slide-number').textContent = data.totalSlides;
                } else {
                    totalSlides = 0;
                    document.getElementById('total-slide-number').textContent = '--';
                }
                updateMenuVisibility();
            } catch (error) {
                totalSlides = 0;
                document.getElementById('total-slide-number').textContent = '--';
                updateMenuVisibility();
            }
        }

        // Update both slide numbers
        async function updateSlideInfo() {
            await Promise.all([
                fetchCurrentSlide(),
                fetchTotalSlides()
            ]);
        }

        // Load planned times and update slide labels and total time
        async function loadTimingFileAndUpdateTotal() {
            try {
                const timingResponse = await fetch('/slide_timings/load', { method: 'POST' });
                const timingData = await timingResponse.json();
                if (timingData.status === 'success') {
                    window.timingData = timingData.plannedTimings || {};
                    // Calculate and display total planned time
                    if (timingData.totalPlannedTime) {
                        const totalSeconds = timingData.totalPlannedTime;
                        const hours = Math.floor(totalSeconds / 3600);
                        const minutes = Math.floor((totalSeconds % 3600) / 60);
                        const seconds = Math.floor(totalSeconds % 60);
                        const formattedTime = `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                        document.getElementById('total-time-display').textContent = formattedTime;
                    }
                    // Generate slides with planned times only
                    if (totalSlides > 0) {
                        generateSlides(totalSlides, timingData.plannedTimings || {});
                    }
                } else {
                    document.getElementById('total-time-display').textContent = '0:00:00';
                    window.timingData = {};
                    if (totalSlides > 0) {
                        generateSlides(totalSlides, {});
                    }
                }
            } catch (error) {
                document.getElementById('total-time-display').textContent = '0:00:00';
                window.timingData = {};
                if (totalSlides > 0) {
                    generateSlides(totalSlides, {});
                }
            }
        }

        // Generate slide elements with planned time only
        function generateSlides(slideCount, timings = {}) {
            const container = document.getElementById('slides-container');
            const noMessageElement = document.getElementById('no-presentation-message');
            if (noMessageElement) noMessageElement.remove();
            container.innerHTML = '';
            for (let i = 1; i <= slideCount; i++) {
                const slideElement = document.createElement('div');
                slideElement.className = 'slide-progress editable-slide';
                slideElement.id = `slide-${i}`;
                const slideTimingSeconds = timings[i] || 60;
                const plannedTimeDisplay = formatTime(slideTimingSeconds);
                const labelHtml = `<span class="slide-label">Slide <span class="slide-number">${i}</span></span>`;
                const progressTimeHtml = `<span class="progress-time editable-time"><span class="planned-time">${plannedTimeDisplay}</span></span>`;
                slideElement.innerHTML = `
                    ${labelHtml}
                    ${progressTimeHtml}
                    <button class="edit-icon" onclick="editTime('slide-${i}')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M11 4H4C2.89543 4 2 4.89543 2 6V18C2 19.1046 2.89543 20 4 20H16C17.1046 20 18 19.1046 18 18V11M18.5 2.5C19.3284 1.67157 20.6716 1.67157 21.5 2.5C22.3284 3.32843 22.3284 4.67157 21.5 5.5L12 15L8 16L9 12L18.5 2.5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                `;
                slideElement.addEventListener('click', function(event) {
                    if (event.target.closest('.edit-icon')) return;
                    if (slideElement.classList.contains('editing')) return;
                    navigateToSlide(i);
                });
                slideElement.style.cursor = 'pointer';
                container.appendChild(slideElement);
            }
            updateCurrentSlideHighlight();
            updateMenuVisibility();
            // Ensure scroll after DOM update with proper timing
            scrollToCurrentSlideDebounced();
            // Also add immediate fallback after a short delay
            setTimeout(() => {
                ensureCurrentSlideVisible();
            }, 100);
        }

        // Update current slide highlighting
        function updateCurrentSlideHighlight() {
            // Remove current highlighting
            document.querySelectorAll('.slide-progress').forEach(slide => {
                slide.classList.remove('current-slide');
                const slideNumber = slide.querySelector('.slide-number');
                if (slideNumber) {
                    slideNumber.classList.remove('yellow');
                }
            });
            
            // Add highlighting to current slide
            const currentSlideElement = document.getElementById(`slide-${currentSlideIndex}`);
            if (currentSlideElement) {
                currentSlideElement.classList.add('current-slide');
                const slideNumber = currentSlideElement.querySelector('.slide-number');
                if (slideNumber) {
                    slideNumber.classList.add('yellow');
                }
            }
        }

        // Scroll the current slide to the top of the slides container
        function ensureCurrentSlideVisible() {
            const currentSlideElement = document.getElementById(`slide-${currentSlideIndex}`);
            const slidesContainer = document.getElementById('slides-container');
            
            if (!currentSlideElement || !slidesContainer) {
                return;
            }
            
            // Calculate position relative to slides container
            const slideRect = currentSlideElement.getBoundingClientRect();
            const containerRect = slidesContainer.getBoundingClientRect();
            
            // Calculate the slide's position relative to the container's content
            const relativeTop = slideRect.top - containerRect.top + slidesContainer.scrollTop;
            
            slidesContainer.scrollTo({
                top: relativeTop,
                behavior: 'smooth'
            });
        }



        // Debounced version to prevent multiple rapid calls
        let scrollToCurrentSlideTimeout = null;
        function scrollToCurrentSlideDebounced() {
            // Clear any existing timeout
            if (scrollToCurrentSlideTimeout) {
                clearTimeout(scrollToCurrentSlideTimeout);
            }
            
            // Set a new timeout to ensure DOM has settled
            scrollToCurrentSlideTimeout = setTimeout(() => {
                ensureCurrentSlideVisible();
                scrollToCurrentSlideTimeout = null;
            }, 10); // Small delay for faster response
        }

        // Check if we just returned from opening a presentation
        function checkForNewPresentation() {
            // Check if there's a flag indicating we just opened a presentation
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('presentation_opened') === 'true') {
                // Reset timer when opening a new presentation
                resetTimer();
                
                // Update slide info and load timing file
                setTimeout(async () => {
                    await updateSlideInfo();
                    await loadTimingFileAndUpdateTotal();
                }, 1000); // Small delay to ensure backend has processed the file
                
                // Remove the parameter from URL without refreshing
                const url = new URL(window.location);
                url.searchParams.delete('presentation_opened');
                window.history.replaceState({}, document.title, url);
            }
        }

        // Hamburger menu functionality
        function toggleMenu() {
            const hamburger = document.getElementById('hamburger-menu');
            const dropdown = document.getElementById('dropdown-menu');
            
            hamburger.classList.toggle('active');
            dropdown.classList.toggle('show');
        }

        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            const hamburger = document.getElementById('hamburger-menu');
            const dropdown = document.getElementById('dropdown-menu');
            
            if (!hamburger.contains(event.target) && !dropdown.contains(event.target)) {
                hamburger.classList.remove('active');
                dropdown.classList.remove('show');
            }
        });

        // Menu item functions
        function openPresentation() {
            // Close the hamburger menu
            toggleMenu();
            
            // Navigate to the open presentation page
            window.location.href = '/open-presentation';
        }

        async function stopPresentationFromMenu() {
            // Close the hamburger menu
            toggleMenu();
            
            try {
                console.log('🛑 Stopping presentation...');
                await stopPresentation();
                console.log('✅ Presentation stopped from menu');
            } catch (error) {
                console.error('❌ Error stopping presentation from menu:', error);
                alert('Error stopping presentation. Make sure Keynote is running.');
            }
        }

        async function closePresentationFromMenu() {
            // Close the hamburger menu
            toggleMenu();
            try {
                console.log('❌ Closing presentation...');
                const response = await fetch('/close_presentation', { method: 'POST' });
                const data = await response.json();
                if (data.status === 'success') {
                    // UI will be reset by WebSocket event or polling
                    console.log('✅ Presentation closed from menu');
                } else {
                    alert('Failed to close presentation: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('❌ Error closing presentation from menu:', error);
                alert('Error closing presentation. Make sure Keynote is running.');
            }
        }

        // Update menu visibility based on presentation state
        function updateMenuVisibility() {
            const stopPresentationMenu = document.getElementById('stop-presentation-menu');
            const closePresentationMenu = document.getElementById('close-presentation-menu');
            if (stopPresentationMenu) {
                // Show "Stop Presentation" only when presentation is actively running
                if (isPresentationMode && isPlaying) {
                    stopPresentationMenu.style.display = 'block';
                } else {
                    stopPresentationMenu.style.display = 'none';
                }
            }
            if (closePresentationMenu) {
                // Show "Close Presentation" only when a presentation is open
                if (totalSlides > 0) {
                    closePresentationMenu.style.display = 'block';
                } else {
                    closePresentationMenu.style.display = 'none';
                }
            }
        }

        // Add functions to window for debugging from browser console
        window.timerDebug = {
            startTimer: startTimer,
            stopTimer: stopTimer,
            resetTimer: resetTimer,
            getTimerState: function() {
                return {
                    timerInterval: !!timerInterval,
                    presentationStartTime: presentationStartTime,
                    totalElapsedSeconds: totalElapsedSeconds,
                    isPaused: isPaused,
                    pauseStartTime: pauseStartTime,
                    totalPausedTime: totalPausedTime,
                    isPresentationMode: isPresentationMode,
                    isPlaying: isPlaying
                };
            }
        };

        // Add scroll debugging functions (for development/troubleshooting)
        window.scrollDebug = {
            ensureCurrentSlideVisible: ensureCurrentSlideVisible,
            forceScroll: function() {
                ensureCurrentSlideVisible();
            }
        };

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async function() {
            // Initialize UI state
            
            // Initialize WebSocket connection for real-time updates
            initializeWebSocket();
            
            // Check if we returned from opening a presentation
            checkForNewPresentation();
            
            // Get slide info first
            await updateSlideInfo();
            
            // If we have slides, generate them
            if (totalSlides > 0) {
                await loadTimingFileAndUpdateTotal();
            } else {
                // No presentation loaded, show message
                clearSlides();
            }
            
            // Update every 2 seconds
            setInterval(async () => {
                const oldTotalSlides = totalSlides;
                const oldCurrentSlide = currentSlideIndex;
                await updateSlideInfo();
                
                // Check if presentation was closed (no slides detected)
                if (totalSlides === 0 && (oldTotalSlides > 0 || oldCurrentSlide > 0)) {
                    console.log('📄 Presentation closed detected via polling - resetting UI');
                    
                    // Reset all displays when presentation is closed
                    resetTimer();
                    document.getElementById('total-time-display').textContent = '0:00:00';
                    document.getElementById('tracking-display').textContent = '0:00';
                    
                    // Reset presentation state
                    isPresentationMode = false;
                    isPlaying = false;
                    
                    // Clear timing data
                    window.timingData = {};
                    
                    // Clear slides
                    clearSlides();
                }
                // If slide count changed and we have slides, regenerate them
                else if (totalSlides !== oldTotalSlides) {
                    if (totalSlides > 0) {
                        await loadTimingFileAndUpdateTotal();
                    } else {
                        clearSlides();
                        // Also reset Total Time when clearing slides
                        document.getElementById('total-time-display').textContent = '0:00:00';
                        window.timingData = {};
                    }
                }
                // If slide changed but total didn't change, ensure scroll happens
                else if (oldCurrentSlide !== currentSlideIndex && totalSlides > 0) {
                    scrollToCurrentSlideDebounced();
                }
            }, 2000);
            
            // Add hamburger menu click listener
            document.getElementById('hamburger-menu').addEventListener('click', toggleMenu);

            // Add play/pause toggle logic for the Play button
            async function togglePlayPause() {
                const playPauseIcon = document.getElementById('play-pause-icon');
                if (!isPresentationMode || !isPlaying) {
                    // Not in presentation mode: start presentation via backend
                    try {
                        const response = await fetch('/start_presentation');
                        const data = await response.json();
                        if (data.status === 'success') {
                            if (playPauseIcon) playPauseIcon.src = 'static/images/pause.svg';
                        } else {
                            alert('Failed to start presentation: ' + (data.message || 'Unknown error'));
                            if (playPauseIcon) playPauseIcon.src = 'static/images/play.svg';
                        }
                    } catch (error) {
                        alert('Error starting presentation. Make sure Keynote is running.');
                        if (playPauseIcon) playPauseIcon.src = 'static/images/play.svg';
                    }
                } else {
                    // Presentation is running: stop presentation via backend
                    try {
                        const response = await fetch('/stop_presentation');
                        const data = await response.json();
                        if (data.status === 'success') {
                            // Backend will emit presentation_stopped event, which will update UI and timers
                            if (playPauseIcon) playPauseIcon.src = 'static/images/play.svg';
                        } else {
                            alert('Failed to stop presentation: ' + (data.message || 'Unknown error'));
                            // Fallback: pause timers locally
                            pausePresentationTimer();
                            if (slideTimers[currentSlideIndex]) {
                                pauseSlideTimer(currentSlideIndex);
                            }
                            if (playPauseIcon) playPauseIcon.src = 'static/images/play.svg';
                        }
                    } catch (error) {
                        alert('Error stopping presentation. Make sure Keynote is running.');
                        // Fallback: pause timers locally
                        pausePresentationTimer();
                        if (slideTimers[currentSlideIndex]) {
                            pauseSlideTimer(currentSlideIndex);
                        }
                        if (playPauseIcon) playPauseIcon.src = 'static/images/play.svg';
                    }
                }
            }

            // Add play/pause button event listener
            document.getElementById('play-pause-btn').addEventListener('click', togglePlayPause);
        });

        // Cleanup timer on page unload
        window.addEventListener('beforeunload', function() {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
        });

        // Global state tracking
        let isPresentationMode = false;
        let isPlaying = false;

        // Control button functions
        async function goToFirstSlide() {
            try {
                console.log('⏮️ Going to first slide...');
                const response = await fetch('/goto_slide/1');
                const data = await response.json();
                
                if (data.status === 'success') {
                    console.log('✅ Moved to first slide');
                    // Update will happen automatically via monitoring
                } else {
                    console.error('❌ Failed to go to first slide:', data.message);
                    alert('Failed to go to first slide: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('❌ Error going to first slide:', error);
                alert('Error going to first slide. Make sure Keynote is running.');
            }
        }

        async function goToLastSlide() {
            try {
                console.log('⏭️ Going to last slide...');
                
                // First get the total number of slides
                const totalSlidesResponse = await fetch('/total_slides');
                const totalSlidesData = await totalSlidesResponse.json();
                
                if (totalSlidesData.status !== 'success' || !totalSlidesData.totalSlides) {
                    alert('Could not determine total slides. Make sure a presentation is open.');
                    return;
                }
                
                const lastSlideNumber = totalSlidesData.totalSlides;
                
                // Now go to the last slide
                const response = await fetch(`/goto_slide/${lastSlideNumber}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    console.log(`✅ Moved to last slide (${lastSlideNumber})`);
                    // Update will happen automatically via monitoring
                } else {
                    console.error('❌ Failed to go to last slide:', data.message);
                    alert('Failed to go to last slide: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('❌ Error going to last slide:', error);
                alert('Error going to last slide. Make sure Keynote is running.');
            }
        }

        // Navigate to a specific slide by clicking on slide label
        async function navigateToSlide(slideNumber) {
            try {
                console.log(`🎯 Navigating to slide ${slideNumber}...`);
                const slideElement = document.getElementById(`slide-${slideNumber}`);
                if (slideElement) {
                    slideElement.classList.add('navigating');
                }
                const response = await fetch(`/goto_slide/${slideNumber}`);
                const data = await response.json();
                if (data.status === 'success') {
                    console.log(`✅ Successfully navigated to slide ${slideNumber}: ${data.message}`);
                    // Update will happen automatically via monitoring/WebSocket
                } else {
                    console.error(`❌ Failed to navigate to slide ${slideNumber}:`, data.message);
                    alert(`Failed to navigate to slide ${slideNumber}: ` + (data.message || 'Unknown error'));
                }
            } catch (error) {
                console.error(`❌ Error navigating to slide ${slideNumber}:`, error);
                alert(`Error navigating to slide ${slideNumber}. Make sure Keynote is running.`);
            } finally {
                setTimeout(() => {
                    const slideElement = document.getElementById(`slide-${slideNumber}`);
                    if (slideElement) {
                        slideElement.classList.remove('navigating');
                    }
                }, 500);
            }
        }

        async function nextSlide() {
            try {
                console.log('➡️ Moving to next slide...');
                if (currentSlideIndex >= 1 && totalSlides >= 1) {
                    const nextSlideNumber = currentSlideIndex + 1;
                    if (nextSlideNumber > totalSlides) {
                        console.log('⚠️ Already at the last slide');
                        alert(`Already at the last slide (${totalSlides})`);
                        return;
                    }
                    const response = await fetch(`/goto_slide/${nextSlideNumber}`);
                    const data = await response.json();
                    if (data.status === 'success') {
                        console.log(`✅ Moved to next slide (${nextSlideNumber}): ${data.message}`);
                    } else {
                        console.error('❌ Failed to move to next slide:', data.message);
                        alert('Failed to move to next slide: ' + (data.message || 'Unknown error'));
                    }
                } else {
                    console.log('Using fallback next_slide endpoint...');
                    const response = await fetch('/next_slide');
                    const data = await response.json();
                    if (data.status === 'success') {
                        console.log('✅ Moved to next slide');
                    } else {
                        console.error('❌ Failed to move to next slide:', data.message);
                        alert('Failed to move to next slide: ' + (data.message || 'Unknown error'));
                    }
                }
            } catch (error) {
                console.error('❌ Error moving to next slide:', error);
                alert('Error moving to next slide. Make sure Keynote is running.');
            }
        }

        async function previousSlide() {
            try {
                console.log('⬅️ Moving to previous slide...');
                if (currentSlideIndex >= 1 && totalSlides >= 1) {
                    const previousSlideNumber = currentSlideIndex - 1;
                    if (previousSlideNumber < 1) {
                        console.log('⚠️ Already at the first slide');
                        alert('Already at the first slide (1)');
                        return;
                    }
                    const response = await fetch(`/goto_slide/${previousSlideNumber}`);
                    const data = await response.json();
                    if (data.status === 'success') {
                        console.log(`✅ Moved to previous slide (${previousSlideNumber}): ${data.message}`);
                    } else {
                        console.error('❌ Failed to move to previous slide:', data.message);
                        alert('Failed to move to previous slide: ' + (data.message || 'Unknown error'));
                    }
                } else {
                    console.log('Using fallback previous_slide endpoint...');
                    const response = await fetch('/previous_slide');
                    const data = await response.json();
                    if (data.status === 'success') {
                        console.log('✅ Moved to previous slide');
                    } else {
                        console.error('❌ Failed to move to previous slide:', data.message);
                        alert('Failed to move to previous slide: ' + (data.message || 'Unknown error'));

                console.error('❌ Error moving to previous slide:', error);
                alert('Error moving to previous slide. Make sure Keynote is running.');

        // WebSocket initialization and event handlers
        function initializeWebSocket() {
            try {
                socket = io();
                
                socket.on('connect', function() {
                    console.log('🔗 Connected to WebSocket server');
                });
                
                socket.on('disconnect', function() {
                    console.log('🔌 Disconnected from WebSocket server');
                });
                
                socket.on('connect_error', function(error) {
                    console.error('❌ WebSocket connection error:', error);
                });
                
                socket.on('slide_changed', function(data) {
                    console.log('📍 Slide changed event:', data);
                    const oldSlideIndex = currentSlideIndex;
                    
                    currentSlideIndex = data.slideNumber;
                    totalSlides = data.totalSlides;
                    
                    // Update UI
                    document.getElementById('current-slide-number').textContent = data.slideNumber;
                    document.getElementById('total-slide-number').textContent = data.totalSlides;
                    updateCurrentSlideHighlight();
                    
                    // Update tracking display if timer is running
                    if (presentationStartTime) {
                        updateTrackingDisplay();
                    }
                    
                    // Scroll to current slide if it actually changed
                    if (oldSlideIndex !== currentSlideIndex) {
                        scrollToCurrentSlideDebounced();
                    }
                    
                    // Update presentation state if provided
                    if (data.presentationRunning !== undefined) {
                        isPresentationMode = data.presentationRunning;
                        isPlaying = data.presentationRunning;
                    }
                });
                
                socket.on('presentation_started', function(data) {
                    console.log('🎬 Presentation started event:', data);
                    isPresentationMode = true;
                    isPlaying = true;
                    updateMenuVisibility();
                    
                    // Start the timer
                    startTimer();
                    
                    // Update current slide if provided
                    if (data.currentSlide) {
                        const oldSlideIndex = currentSlideIndex;
                        currentSlideIndex = data.currentSlide;
                        document.getElementById('current-slide-number').textContent = data.currentSlide;
                        updateCurrentSlideHighlight();
                        
                        // Scroll to current slide if it changed
                        if (oldSlideIndex !== currentSlideIndex) {
                            scrollToCurrentSlideDebounced();
                        }
                    }
                });
                
                socket.on('presentation_stopped', function(data) {
                    console.log('🛑 Presentation stopped event:', data);
                    isPresentationMode = false;
                    isPlaying = false;
                    
                    // Stop/pause the timer
                    stopTimer();
                });
                
                socket.on('presentation_closed', function(data) {
                    console.log('📄 Presentation closed event:', data);
                    
                    // Reset presentation state
                    isPresentationMode = false;
                    isPlaying = false;
                    
                    // Reset timer and display
                    resetTimer();
                    
                    // Reset slide displays
                    currentSlideIndex = 1;
                    totalSlides = 0;
                    document.getElementById('current-slide-number').textContent = '--';
                    document.getElementById('total-slide-number').textContent = '--';
                    document.getElementById('total-time-display').textContent = '0:00:00'; // Reset Total Time
                    
                    // Clear timing data
                    window.timingData = {};
                    
                    // Clear slides and show no presentation message
                    clearSlides();
                    
                    // Update menu visibility
                    updateMenuVisibility();
                    
                    console.log('✅ UI reset for closed presentation - Total Time set to 0:00:00');
                });
                
                socket.on('monitoring_status', function(data) {
                    console.log('📡 Monitoring status:', data);
                });
                
                // Request to start monitoring when connected
                socket.emit('start_monitoring');
                
            } catch (error) {
                console.error('❌ Failed to initialize WebSocket:', error);
            }
        }

        // Timer functions
        function startTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            // If this is a fresh start (not resuming from pause)
            if (!presentationStartTime) {
                presentationStartTime = Date.now();
                totalElapsedSeconds = 0;
                totalPausedTime = 0;
            } else if (isPaused && pauseStartTime) {
                // If resuming from pause, add the paused time to total
                totalPausedTime += Date.now() - pauseStartTime;
                pauseStartTime = null;
            }
            isPaused = false;
            // Update the timer every second
            timerInterval = setInterval(updateTimerDisplay, 1000);
            // Update immediately
            updateTimerDisplay();
            console.log('⏱️ Timer started');
        }
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            if (!isPaused && presentationStartTime) {
                pauseStartTime = Date.now();
                isPaused = true;
            }
            console.log('⏸️ Timer paused');
        }
        function resetTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            presentationStartTime = null;
            totalElapsedSeconds = 0;
            isPaused = false;
            pauseStartTime = null;
            totalPausedTime = 0;
            console.log('🔄 Timer reset');
        }

        // Add the missing updateTimerDisplay function
        function updateTimerDisplay() {
            let elapsed = totalElapsedSeconds;
            if (presentationStartTime && !isPaused) {
                elapsed = Math.floor((Date.now() - presentationStartTime - totalPausedTime) / 1000);
            }
            // Update the main timer display
            const hours = Math.floor(elapsed / 3600).toString().padStart(2, '0');
            const minutes = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
            const seconds = Math.floor(elapsed % 60).toString().padStart(2, '0');
            document.getElementById('main-time-hours').textContent = hours;
            document.getElementById('main-time-minutes').textContent = minutes;
            document.getElementById('main-time-seconds').textContent = seconds;
            // Update the tracking display (M:SS)
            document.getElementById('tracking-display').textContent = `${parseInt(minutes)}:${seconds}`;
        }

        // Add the missing updateTrackingDisplay function
        function updateTrackingDisplay() {
            let elapsed = totalElapsedSeconds;
            if (presentationStartTime && !isPaused) {
                elapsed = Math.floor((Date.now() - presentationStartTime - totalPausedTime) / 1000);
            }
            const minutes = Math.floor((elapsed % 3600) / 60);
            const seconds = Math.floor(elapsed % 60).toString().padStart(2, '0');
            document.getElementById('tracking-display').textContent = `${minutes}:${seconds}`;
        }

        // Utility to clear all slides and show the no-presentation message
        function clearSlides() {
            const container = document.getElementById('slides-container');
            if (container) {
                container.innerHTML = '';
                const noMessageElement = document.createElement('div');
                noMessageElement.className = 'no-presentation-message';
                noMessageElement.id = 'no-presentation-message';
                noMessageElement.style.textAlign = 'center';
                noMessageElement.style.padding = '40px';
                noMessageElement.style.color = '#888';
                noMessageElement.style.fontStyle = 'italic';
                noMessageElement.textContent = 'No presentation loaded. Use the menu to open a presentation.';
                container.appendChild(noMessageElement);
            }
        }
    </script>

    <!-- Slide Time Keypad Modal -->
    <div id="slide-time-keypad-modal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:#222; color:#fff; border-radius:16px; padding:32px 24px 24px 24px; min-width:300px; max-width:90vw; box-shadow:0 4px 32px rgba(0,0,0,0.3); display:flex; flex-direction:column; align-items:center;">
            <div id="keypad-time-display" style="font-size:2.2em; font-weight:600; letter-spacing:2px; margin-bottom:18px; min-width:120px; text-align:center; background:#111; border-radius:8px; padding:8px 0;">00:00</div>
            <div id="keypad-buttons" style="display:grid; grid-template-columns:repeat(3,60px); gap:12px; margin-bottom:18px;">
                <button class="keypad-btn" data-key="1">1</button>
                <button class="keypad-btn" data-key="2">2</button>
                <button class="keypad-btn" data-key="3">3</button>
                <button class="keypad-btn" data-key="4">4</button>

                <button class="keypad-btn" data-key="6">6</button>

                <button class="keypad-btn" data-key="9">9</button>

                <button class="keypad-btn" data-key="0">0</button>
                <button class="keypad-btn" data-key="back" style="font-size:1.2em;">⌫</button>
            </div>
            <div style="display:flex; gap:24px;">
                <button id="keypad-cancel-btn" style="background:#444; color:#fff; border:none; border-radius:6px; padding:10px 24px; font-size:1.1em;">Cancel</button>
                <button id="keypad-ok-btn" style="background:#ffd60a; color:#222; border:none; border-radius:6px; padding:10px 24px; font-size:1.1em; font-weight:600;">OK</button>
            </div>
        </div>
    </div>

    <style>
        .keypad-btn {
            background: #333;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.3em;
            padding: 16px 0;
            cursor: pointer;
            transition: background 0.15s;
        }
        .keypad-btn:active {
            background: #ffd60a;
            color: #222;
        }
        #slide-time-keypad-modal:focus {
            outline: none;
        }
    </style>

    <script>
    // --- Slide Time Keypad Modal Logic ---
    let keypadActiveSlideId = null;
    let keypadInitialValue = '';
    let keypadRawInput = '';

    function showSlideTimeKeypad(slideId, initialValue) {
        keypadActiveSlideId = slideId;
        keypadInitialValue = initialValue || '00:00';
        // Convert initialValue (MM:SS) to raw input (e.g., '1234' for 12:34)
        keypadRawInput = initialValue && initialValue.includes(':') ? initialValue.replace(':', '') : '0000';
        updateKeypadDisplay();
        document.getElementById('slide-time-keypad-modal').style.display = 'flex';
    }
    function hideSlideTimeKeypad() {
        document.getElementById('slide-time-keypad-modal').style.display = 'none';
        keypadActiveSlideId = null;
        keypadInitialValue = '';
        keypadRawInput = '';
    }
    function formatKeypadDisplay(raw) {
        // Always pad to 4 digits
        raw = raw.padStart(4, '0').slice(-4);
        let min = raw.slice(0, 2);
        let sec = raw.slice(2, 4);
        return min + ':' + sec;
    }
    function updateKeypadDisplay() {
        document.getElementById('keypad-time-display').textContent = formatKeypadDisplay(keypadRawInput);
    }
    function isValidTimeFormat(str) {
        // Accepts MM:SS, 00:00 to 59:59
        if (!/^\d{2}:\d{2}$/.test(str)) return false;
        const [min, sec] = str.split(':').map(Number);
        return min < 60 && sec < 60;
    }
    function handleKeypadInput(key) {
        if (key === 'back') {
            if (keypadRawInput.length > 0) {
                keypadRawInput = keypadRawInput.slice(0, -1);
            }
        } else if (key === 'clear') {
            keypadRawInput = '';
        } else if (/^\d$/.test(key)) {
            if (keypadRawInput.length < 4) {
                keypadRawInput += key;
            }
        }
        updateKeypadDisplay();
    }
    document.getElementById('keypad-buttons').addEventListener('click', function(e) {
        if (e.target.classList.contains('keypad-btn')) {
            handleKeypadInput(e.target.getAttribute('data-key'));
        }
    });
    document.getElementById('keypad-cancel-btn').addEventListener('click', function() {
        hideSlideTimeKeypad();
    });
    document.getElementById('keypad-ok-btn').addEventListener('click', async function() {
        const formatted = formatKeypadDisplay(keypadRawInput);
        if (!isValidTimeFormat(formatted)) {
            alert('Please enter a valid time in MM:SS format.');
            return;
        }
        const slideId = keypadActiveSlideId;
        const slideElement = document.getElementById(slideId);
        const timeElement = slideElement.querySelector('.editable-time .planned-time');
        const originalTime = timeElement ? timeElement.textContent : '00:00';
        if (formatted === originalTime) {
            hideSlideTimeKeypad();
            return;
        }
        // Convert MM:SS to seconds
        const [minutes, seconds] = formatted.split(':').map(num => parseInt(num));
        const totalSeconds = minutes * 60 + seconds;
        const slideNumber = parseInt(slideId.replace('slide-', ''));
        try {
            const response = await fetch(`/slide_timings/update/${slideNumber}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ plannedTime: totalSeconds })
            });
            const result = await response.json();
            if (result.status === 'success') {
                if (timeElement) timeElement.textContent = formatted;
                if (window.timingData) window.timingData[slideNumber] = totalSeconds;
                if (result.totalPlannedTime) {
                    const totalSeconds = result.totalPlannedTime;
                    const hours = Math.floor(totalSeconds / 3600);
                    const minutes = Math.floor((totalSeconds % 3600) / 60);
                    const seconds = Math.floor(totalSeconds % 60);
                    const formattedTime = `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    document.getElementById('total-time-display').textContent = formattedTime;
                }
                slideElement.classList.add('timing-updated');
                setTimeout(() => { slideElement.classList.remove('timing-updated'); }, 1000);
            } else {
                alert(`Error saving timing: ${result.message}`);
            }
        } catch (error) {
            alert('Error saving timing. Please try again.');
        }
        hideSlideTimeKeypad();
    });
    // Refactor editTime to use the keypad modal
    function editTime(slideId) {
        const slideElement = document.getElementById(slideId);
        const timeElement = slideElement.querySelector('.editable-time .planned-time');
        let currentTime = timeElement ? timeElement.textContent : '00:00';
        showSlideTimeKeypad(slideId, currentTime);
    }
    </script>
